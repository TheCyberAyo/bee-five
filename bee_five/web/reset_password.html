<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password – BEE FIVE</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFC30B;
      color: #333;
      text-align: center;
    }
    .card {
      max-width: 360px;
      width: 100%;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.6rem;
      margin: 0 0 12px;
      color: #333;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.45;
      margin: 0 0 24px;
      color: #444;
    }
    a.btn {
      display: inline-block;
      width: 100%;
      padding: 16px 24px;
      background: #333;
      color: #FFC30B;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      border-radius: 12px;
      border: 2px solid #000;
    }
    a.btn:active { opacity: 0.9; }
    .hint {
      font-size: 0.9rem;
      color: #666;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">🔒</div>
    <h1>Reset your password</h1>
    <p id="msg">Opening BEE FIVE to set your new password…</p>
    <a id="openBtn" href="#" class="btn">Open BEE FIVE</a>
    <p class="hint">If the app didn't open, tap the button above.</p>
  </div>
  <script>
    (function() {
      var params = window.location.search || window.location.hash || '';
      var appUrl = 'bee-five://reset-password' + params;
      document.getElementById('openBtn').href = appUrl;
      window.location.href = appUrl;
    })();
  </script>
</body>
</html>
