<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email confirmed – Bee Five</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFC30B;
      color: #333;
      text-align: center;
    }
    .card {
      max-width: 360px;
      width: 100%;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.6rem;
      margin: 0 0 12px;
      color: #333;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.45;
      margin: 0 0 32px;
      color: #444;
    }
    a.btn {
      display: inline-block;
      width: 100%;
      padding: 16px 24px;
      background: #333;
      color: #FFC30B;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      border-radius: 12px;
      border: 2px solid #000;
    }
    a.btn:active { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">✓</div>
    <h1>Email confirmed!</h1>
    <p>Return to the app and sign in with your email and password.</p>
    <a href="bee-five://confirm-email" class="btn">Open Bee Five</a>
  </div>
</body>
</html>
