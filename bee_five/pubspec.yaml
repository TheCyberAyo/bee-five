name: bee_five
description: "Bee Five game app."
publish_to: 'none'

version: 1.5.0+26

environment:
  sdk: ^3.10.7
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  audioplayers: ^6.1.0
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1
  provider: ^6.1.2
  app_links: ^6.3.2
  google_mobile_ads: ^7.0.0
  uuid: ^4.0.0
  flutter_local_notifications: ^19.0.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/BEE-FIVE.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/BEE-FIVE.png
    - assets/mapImagery/
    - assets/homeImagery/
    - assets/socials/
    - assets/sounds/